services:
  - type: web
    name: student-counselling-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: RAG_ENABLED
        value: true
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
